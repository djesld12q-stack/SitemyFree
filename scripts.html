<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мої скрипти — sun69wukong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #9146FF; --bg: #07070f; --bg3: #121220; --bg4: #181830;
      --text: #eeeef8; --muted: #6e6e90; --border: rgba(145,70,255,.18);
    }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(145,70,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(145,70,255,.04) 1px, transparent 1px);
      background-size: 44px 44px; pointer-events: none; z-index: 0;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 56px;
      background: rgba(7,7,15,.96); border-bottom: 1px solid var(--border); backdrop-filter: blur(14px);
    }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: var(--accent); text-decoration: none; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; padding-bottom: 2px; border-bottom: 2px solid transparent; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); border-bottom-color: var(--accent); }

    .page { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; padding: 100px 24px 60px; }
    .section-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); margin-bottom: 4px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 5px; margin-bottom: 28px; }

    /* ── GRID ─────────────────────────────────── */
    .scripts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    /* ── CARD ─────────────────────────────────── */
    .script-card {
      background: var(--bg4); border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; display: flex; flex-direction: column;
      transition: transform .2s, border-color .2s, box-shadow .2s; position: relative;
    }
    .script-card:hover { transform: translateY(-4px); border-color: rgba(145,70,255,.45); box-shadow: 0 12px 40px rgba(145,70,255,.2); }

    /* Картинка вгорі картки */
    .script-card-img {
      width: 100%; aspect-ratio: 16/7; object-fit: cover; display: block;
      background: var(--bg3);
    }
    /* Заглушка якщо немає картинки */
    .script-card-img-placeholder {
      width: 100%; aspect-ratio: 16/7;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }

    /* Бейдж категорії поверх картинки */
    .script-card-overlay {
      position: absolute; top: 10px; right: 10px;
      background: rgba(145,70,255,.18); border: 1px solid rgba(145,70,255,.5);
      border-radius: 2px; padding: 3px 10px;
      font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--accent);
      backdrop-filter: blur(6px);
    }

    /* Тіло картки */
    .script-card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
    .script-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--text); }
    .script-desc { font-size: 13px; font-weight: 600; color: var(--muted); line-height: 1.6; flex: 1; }

    .script-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 4px; }
    .script-filename { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .script-dl {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff;
      font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px;
      padding: 7px 16px; border-radius: 3px; text-decoration: none;
      transition: opacity .2s, transform .15s; white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 0 14px rgba(145,70,255,.3);
    }
    .script-dl:hover { opacity: .85; transform: scale(1.04); }

    footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 28px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 60px; }
    footer strong { color: var(--accent); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">sun<span>69</span>wukong</a>
  <div class="nav-links">
    <a href="index.html">Головна</a>
    <a href="about.html">Про мене</a>
    <a href="stream.html">Стрім</a>
    <a href="games.html">Ігри</a>
    <a href="scripts.html" class="active">Мої скрипти</a>
    <a href="links.html">Посилання</a>
  </div>
</nav>

<div class="page">
  <p class="section-label">// скрипти</p>
  <h1 class="section-title">МОЇ СКРИПТИ</h1>

  <div class="scripts-grid" id="scripts-container"></div>
</div>

<footer>❤️ © 24.04.2026 <strong>sun69wukong</strong> ❤️</footer>

<script>
  // ══════════════════════════════════════════════════════════════════
  //  ▼▼▼  ДОДАВАЙТЕ НОВІ СКРИПТИ СЮДИ  ▼▼▼
  //
  //  img     — пряме посилання на картинку (або залиш "" для емодзі)
  //  icon    — емодзі-заглушка якщо img порожній
  //  fileId  — ID файлу з Google Drive
  //            (з посилання drive.google.com/file/d/XXXXXXX/view
  //             беріть тільки XXXXXXX)
  // ══════════════════════════════════════════════════════════════════
  const SCRIPTS = [

    {
      name:        "Назва скрипта",
      description: "Опис що робить цей скрипт — декілька речень про функціонал.",
      category:    "OBS",
      filename:    "script.lua",
      img:         "",          // ← вставте пряме посилання на картинку, або залиш ""
      icon:        "🎮",        // ← емодзі якщо img порожній
      fileId:      "1wf-NMFqdUo-R9XrcH2DfueDzneVIft3k"
    },

    // Ще один приклад із картинкою:
    // {
    //   name:        "Другий скрипт",
    //   description: "Опис...",
    //   category:    "TWITCH",
    //   filename:    "twitch_alert.js",
    //   img:         "https://ПРЯМЕ_ПОСИЛАННЯ_НА_ФОТО.jpg",
    //   icon:        "📺",
    //   fileId:      "XXXXXXXXXXXXXXXXX"
    // },

  ];
  // ══════════════════════════════════════════════════════════════════

  function makeDriveDownloadUrl(fileId) {
    return `https://drive.usercontent.google.com/download?id=${fileId}&export=download&confirm=t`;
  }

  const container = document.getElementById('scripts-container');

  container.innerHTML = SCRIPTS.map(s => `
    <div class="script-card">

      ${s.img
        ? `<img class="script-card-img" src="${s.img}" alt="${s.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
           <div class="script-card-img-placeholder" style="display:none">${s.icon || '📄'}</div>`
        : `<div class="script-card-img-placeholder">${s.icon || '📄'}</div>`
      }

      <div class="script-card-overlay">${s.category || 'СКРИПТ'}</div>

      <div class="script-card-body">
        <div class="script-title">${s.name}</div>
        <div class="script-desc">${s.description}</div>
        <div class="script-footer">
          <span class="script-filename">📎 ${s.filename}</span>
          <a class="script-dl" href="${makeDriveDownloadUrl(s.fileId)}" target="_blank">
            ↓ ЗАВАНТАЖИТИ
          </a>
        </div>
      </div>

    </div>
  `).join('');
</script>
</body>
</html>

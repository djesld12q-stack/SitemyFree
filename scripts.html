<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мої скрипти — sun69wukong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #9146FF; --bg: #07070f; --bg3: #121220; --bg4: #181830;
      --text: #eeeef8; --muted: #6e6e90; --border: rgba(145,70,255,.18);
    }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(145,70,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(145,70,255,.04) 1px, transparent 1px);
      background-size: 44px 44px; pointer-events: none; z-index: 0;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 56px;
      background: rgba(7,7,15,.96); border-bottom: 1px solid var(--border); backdrop-filter: blur(14px);
    }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: var(--accent); text-decoration: none; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; padding-bottom: 2px; border-bottom: 2px solid transparent; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); border-bottom-color: var(--accent); }

    .page { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; padding: 100px 24px 60px; }
    .section-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); margin-bottom: 4px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 5px; margin-bottom: 28px; }

    .scripts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

    .script-card {
      background: var(--bg4); border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; transition: transform .2s, border-color .2s, box-shadow .2s;
      display: flex; flex-direction: column;
    }
    .script-card:hover { transform: translateY(-4px); border-color: rgba(145,70,255,.45); box-shadow: 0 12px 40px rgba(145,70,255,.2); }

    .script-card img {
      width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;
      background: var(--bg3);
    }

    .script-card-body {
      padding: 14px 16px 16px;
      display: flex; flex-direction: column; gap: 10px; flex: 1;
    }

    .script-card-header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }

    .script-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--text); }

    /* ── опис ── */
    .script-desc {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.55;
      color: var(--muted);
      border-left: 2px solid rgba(145,70,255,.35);
      padding-left: 10px;
    }

    .script-dl {
      display: inline-flex; align-items: center; gap: 6px; align-self: flex-start;
      background: var(--accent); color: #fff;
      font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px;
      padding: 7px 14px; border-radius: 3px; text-decoration: none;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 0 14px rgba(145,70,255,.3);
    }
    .script-dl:hover { opacity: .85; transform: scale(1.04); }

    footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 28px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 60px; }
    footer strong { color: var(--accent); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">sun<span>69</span>wukong</a>
  <div class="nav-links">
    <a href="index.html">Головна</a>
    <a href="about.html">Про мене</a>
    <a href="stream.html">Стрім</a>
    <a href="games.html">Ігри</a>
    <a href="scripts.html" class="active">Мої скрипти</a>
    <a href="links.html">Посилання</a>
  </div>
</nav>

<div class="page">
  <p class="section-label">// скрипти</p>
  <h1 class="section-title">МОЇ СКРИПТИ</h1>

  <div class="scripts-grid" id="scripts-container"></div>
</div>

<footer>❤️ © 24.04.2026 <strong>sun69wukong</strong> ❤️</footer>

<script>
  // ▼▼▼ ДОДАВАЙ СКРИПТИ ТУТ ▼▼▼
  const SCRIPTS = [

    {
      name: "TranslateJoin",

      url:  "https://drive.usercontent.google.com/download?id=1XqMbLJizgidnrT9vkhah6eZ8H-ii2HYg&export=download&authuser=0"
    },

    // Приклад з описом:

  document.getElementById('scripts-container').innerHTML = SCRIPTS.map(s => `

      </div>
    </div>
  `).join('');
</script>
</body>
</html>
